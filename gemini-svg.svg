<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a7ebf" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1a1a1a" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>

    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="#3a7ebf" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#3a7ebf" stop-opacity="0.6"/>
    </linearGradient>

    <linearGradient id="neon-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <circle cx="256" cy="256" r="220" fill="url(#glow)"/>

  <rect x="64" y="64" width="384" height="384" rx="80" fill="url(#glass)" stroke="url(#border)" stroke-width="3" filter="url(#shadow)"/>

  <g transform="translate(0, -10)">
    <path d="M 176,180 L 336,180" stroke="url(#neon-blue)" stroke-width="16" stroke-linecap="round" opacity="0.8"/>
    
    <path d="M 190,240 L 256,306 L 322,240" fill="none" stroke="url(#neon-blue)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 256,180 L 256,290" stroke="url(#neon-blue)" stroke-width="24" stroke-linecap="round"/>
    
    <path d="M 160,350 L 210,390 L 302,390 L 352,350" fill="none" stroke="#ffffff" stroke-opacity="0.7" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <circle cx="340" cy="190" r="6" fill="#00f2fe"/>
</svg>
